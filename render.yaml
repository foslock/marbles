# Render.com Blueprint
services:
  - type: web
    name: ltm-server
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LTM_DATABASE_URL
        fromDatabase:
          name: ltm-db
          property: connectionString
      - key: LTM_CORS_ORIGINS
        value: https://ltm-client.onrender.com
    plan: starter

  - type: web
    name: ltm-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: starter

databases:
  - name: ltm-db
    plan: starter
    postgresMajorVersion: 16
